<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ART WAVE 白浪潮 · responsive circle & wave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 1rem;
        }

        .art-container {
            background: #030303;
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 0 0 1px #2a4a2a, 0 20px 35px -10px rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 940px;
            /* slightly more than canvas max width */
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.5rem;
            cursor: crosshair;
            box-shadow: 0 0 0 1px #1f3a1f;
            width: 100%;
            height: auto;
        }

        .title {
            text-align: center;
            margin-top: 1rem;
            font-size: clamp(1rem, 5vw, 1.7rem);
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #8aff80, #40c040);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #0f0f00;
            font-family: 'Courier New', monospace;
        }

        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            background: #0f1a0faa;
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            border: 1px solid #2e6b2e;
        }

        .control-panel label {
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: bold;
            color: #b4ffb0;
            letter-spacing: 1px;
        }

        input {
            background: #1e2a1e;
            border: 1px solid #6aff6a;
            border-radius: 40px;
            height: 5px;
            width: 180px;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
        }

        input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #a0ffa0;
            cursor: pointer;
            box-shadow: 0 0 6px #0f0;
            border: none;
        }

        .speed-value {
            background: #000000aa;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #d0ffd0;
            border-left: 2px solid #6aff6a;
        }

        footer {
            text-align: center;
            margin-top: 0.8rem;
            font-size: clamp(0.6rem, 3vw, 0.85rem);
            color: #4a7a4a;
            font-family: monospace;
            line-height: 1.3;
            white-space: normal;
            word-break: break-word;
        }

        @media (max-width: 700px) {
            .control-panel {
                gap: 0.4rem;
                padding: 0.4rem 0.8rem;
            }

            input {
                width: 140px;
            }

            .art-container {
                padding: 0.8rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
    <div class="art-container">
        <div id="p5canvas"></div>
        <div class="title">ART WAVE 白 浪 潮 1st Wave 第一浪<br><span style="font-size:0.6em;">from 2026.5.2</span></div>
        <div class="control-panel">
            <label>🌊 WAVE DRIFT SPEED</label>
            <input type="range" id="speedSlider" min="0" max="0.78" step="0.002" value="0.322">
            <span id="speedDisplay" class="speed-value">0.322</span>
        </div>
        <footer>
            ✦ 第一章：此刻或不再 | Chapter 1: Now or Never<br>
            央美小白楼3F · Venue: CAFA Small White Building 3F<br>
            Co-Produced by: Apple Keng & ArtWorkers 艺术工人<br>
            Co-curation: Xiaohai Wu, Yi Zhang, Zhiqiang Lv, Hanpu Zhang<br>
            Partners: 振世远景展览服务公司 | 真力音响 GENELEC ✦
        </footer>
    </div>

    <script>
        // --------------------------------------------------------------
        // RESPONSIVE p5 SKETCH – circle & wave keep aspect ratio
        // No fill for any shape. Wave touches circle on lower‑right side.
        // Arrow (clock hand) spins inside circle. Slider controls wave speed.
        // Canvas resizes dynamically while maintaining 900/600 proportion.
        // --------------------------------------------------------------

        let circleX, circleY, R;
        let contactX, contactY;       // wave touches circle at this point
        let waveBaseY;
        let amplitude = 68;
        let t = 0;                    // global animation time

        // wave parameters (living harmonics)
        let k = 0.018;
        let harmonicWeight = 0.65;
        let thirdWeight = 0.45;
        let travelSpeed = 0.322;      // updated by slider

        let contactOffsetX = 36;       // pixels right of circle center (relative to canvas width, but we'll keep absolute? better to keep as proportion of R? but for simplicity stays fixed as pixels, but when canvas resizes we may want to scale? We'll fix it relative to R.)
        // Actually to keep contact point visually similar across sizes, make offset proportional to R.
        let contactOffsetRatio = 0.46; // offset = R * 0.46 (approx 36px when R=78)

        // arrow rotation
        let arrowAngle = 0;
        const arrowBaseSpeed = 0.052;  // rad per frame

        // DOM elements
        let speedSlider, speedDisplay;
        let canvasWidth = 900, canvasHeight = 600; // target base dimensions

        function setup() {
            // Create canvas that fills container but maintains 900/600 ratio
            let container = document.querySelector('.art-container');
            let maxWidth = min(900, container.clientWidth - 32); // subtract padding
            let w = maxWidth;
            let h = w * (600 / 900);
            let canvas = createCanvas(w, h);
            canvas.parent('p5canvas');
            noFill();                    // NO FILL FOR SHAPES
            strokeCap(ROUND);
            strokeJoin(ROUND);

            // update geometry based on current canvas size
            updateGeometry();

            // get slider elements
            speedSlider = select('#speedSlider');
            speedDisplay = select('#speedDisplay');
            speedSlider.input(() => {
                travelSpeed = float(speedSlider.value());
                speedDisplay.html(travelSpeed.toFixed(3));
            });
        }

        function updateGeometry() {
            // circle centered horizontally, at 28% of height from top
            circleX = width / 2;
            circleY = height * 0.28;
            R = min(78, width * 0.17, height * 0.26);  // responsive radius (max 78px, but scales down on small screens)
            // adjust contact offset relative to R
            let dx = constrain(R * contactOffsetRatio, 0, R - 5);
            contactX = circleX + dx;
            contactY = circleY + sqrt(R * R - dx * dx);
            waveBaseY = contactY;
            // amplitude scales proportionally to keep wave visible
            amplitude = min(68, height * 0.12);
        }

        // wave function – ensures crest exactly at contactX
        function waveY(x) {
            let angle0 = k * (x - contactX) + HALF_PI;
            let angle1 = 2 * k * (x - contactX) + HALF_PI;
            let angle2 = 3 * k * (x - contactX) + HALF_PI;

            let dx = x - contactX;
            let travelPhase = 0.42 * sin(dx * 0.038 - t * travelSpeed) * (abs(dx) / 70);

            let fund = sin(angle0 + travelPhase);
            let harm = sin(angle1);
            let third = sin(angle2);

            let total = fund + harmonicWeight * harm + thirdWeight * third;
            let maxPossible = 1 + harmonicWeight + thirdWeight;
            let norm = total / maxPossible;

            return waveBaseY + amplitude * (1 - norm);
        }

        function draw() {
            background(0);
            drawingContext.shadowBlur = 0;
            drawingContext.shadowColor = "transparent";

            // animate harmonic weights for fluid motion
            harmonicWeight = 0.65 + 0.11 * sin(t * 0.43);
            thirdWeight = 0.45 + 0.09 * cos(t * 0.39);

            // ---- draw wave (no fill) ----
            stroke(70, 255, 100, 230);
            strokeWeight(max(1.2, width / 320));  // adaptive stroke weight
            beginShape();
            for (let x = 0; x <= width; x += max(2, width / 300)) {
                let y = waveY(x);
                vertex(x, y);
            }
            endShape();

            // ---- draw large circle (stroke only) ----
            stroke(90, 230, 120);
            strokeWeight(max(1.5, width / 360));
            circle(circleX, circleY, R * 2);

            // inner accent ring
            stroke(60, 180, 80, 100);
            strokeWeight(max(0.8, width / 750));
            circle(circleX, circleY, R * 2 - 8);

            // ---- spinning arrow (clock hand) ----
            push();
            translate(circleX, circleY);
            rotate(arrowAngle);
            stroke(150, 255, 150, 240);
            strokeWeight(max(1.5, width / 400));
            line(0, 0, R - 8, 0);
            strokeWeight(max(1.2, width / 500));
            line(R - 8, 0, R - 14, -5);
            line(R - 8, 0, R - 14, 5);
            pop();

            // ---- highlight contact point (stroke only, no fill) ----
            push();
            stroke(140, 255, 120, 200);
            strokeWeight(max(1.5, width / 450));
            noFill();
            circle(contactX, contactY, 10);
            stroke(220, 255, 160);
            strokeWeight(max(1.2, width / 600));
            circle(contactX, contactY, 4);
            pop();

            // ---- info text drawn on canvas (scales with canvas) ----
            fill(100, 210, 100);
            noStroke();
            let dynamicTextSize = max(9, width / 60);
            textSize(dynamicTextSize);
            textFont("monospace");
            text("央美小白楼3F · White Building Across From CAFAM 3F", 12, height - 20);
            text("one‑point tangency  →  continuous left‑right motion", 12, height - 8);
            text("美院毕业季卫星艺术生态  |  Satellite Art Ecosystem", circleX - width * 0.28, circleY - R - 6);

            // reset noFill for shapes next frame
            noFill();

            // update animations
            arrowAngle += arrowBaseSpeed;
            t += 0.028;
            if (arrowAngle > TWO_PI) arrowAngle -= TWO_PI;
        }

        // Responsive resize: recalculate canvas size and geometry
        function windowResized() {
            let container = document.querySelector('.art-container');
            let maxWidth = min(900, container.clientWidth - 32);
            let newW = max(maxWidth, 300);
            let newH = newW * (600 / 900);
            resizeCanvas(newW, newH);
            updateGeometry();
            redraw();
        }
    </script>
</body>

</html>
