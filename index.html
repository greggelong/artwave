<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ART WAVE 白浪潮 · fixed canvas · scroll on mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow-x: auto;
            /* allow horizontal scroll on narrow screens */
            /*display: flex;
            justify-content: center;
            align-items: center;*/
            padding: 1rem;
        }

        .art-container {
            background: #030303;
            border-radius: 2.5rem;
            padding: 1rem;
            box-shadow: 0 0 0 1px #2a4a2a, 0 20px 35px -10px rgba(0, 255, 0, 0.2);
            width: fit-content;
            /* shrink to content width (900px canvas + padding) */
            margin: 0 auto;
        }

        canvas {
            display: block;
            border-radius: 1.8rem;
            cursor: crosshair;
            box-shadow: 0 0 0 1px #1f3a1f;
        }

        .title {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #8aff80, #40c040);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #0f0f00;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            /* prevent line break on small screens, let scroll handle */
        }

        @media (max-width: 950px) {
            .title {
                font-size: 1.2rem;
                letter-spacing: 2px;
                white-space: normal;
                /* wrap on very narrow screens */
            }
        }

        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            background: #0f1a0faa;
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #2e6b2e;
        }

        .control-panel label {
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            color: #b4ffb0;
            letter-spacing: 1px;
        }

        input {
            background: #1e2a1e;
            border: 1px solid #6aff6a;
            border-radius: 40px;
            height: 6px;
            width: 220px;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
        }

        input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #a0ffa0;
            cursor: pointer;
            box-shadow: 0 0 6px #0f0;
            border: none;
        }

        .speed-value {
            background: #000000aa;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #d0ffd0;
            border-left: 2px solid #6aff6a;
        }

        footer {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: #4a7a4a;
            font-family: monospace;
            line-height: 1.4;
        }

        @media (max-width: 950px) {
            .art-container {
                margin: 0;
                /* left align on narrow screens */
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

    <div class="art-container">
        <div id="p5canvas"></div>
        <div class="title">ART WAVE 白 浪 潮 1st Wave第一浪 from 2026.5.2</div>
        <div class="control-panel">
            <label>🌊 WAVE DRIFT SPEED</label>
            <input type="range" id="speedSlider" min="0" max="0.78" step="0.002" value="0.322">
            <span id="speedDisplay" class="speed-value">0.322</span>
        </div>
        <footer>
            ✦ 第一章：此刻或不再 | Chapter 1: Now or Never<br>
            央美小白楼3F · Venue: CAFA Small White Building 3F<br>
            Co-Produced by: Apple Keng & ArtWorkers 艺术工人<br>
            Co-curation: Xiaohai Wu, Yi Zhang, Zhiqiang Lv, Hanpu Zhang<br>
            Partners & Sponsors: 振世远景展览服务公司 | 真力音响 GENELEC ✦
        </footer>
    </div>

    <script>
        // --------------------------------------------------------------
        // FIXED CANVAS (900x600) - no responsive resizing
        // Wave, circle, arrow keep original proportions
        // Use horizontal scroll on mobile (no squish)
        // --------------------------------------------------------------

        let circleX, circleY, R;
        let contactX, contactY;
        let waveBaseY;
        let amplitude = 68;
        let t = 0;

        let k = 0.018;
        let harmonicWeight = 0.65;
        let thirdWeight = 0.45;
        let travelSpeed = 0.322;

        let contactOffsetX = 36;       // fixed pixel offset
        let arrowAngle = 0;
        const arrowBaseSpeed = 0.052;

        let speedSlider, speedDisplay;

        function setup() {
            let canvas = createCanvas(900, 600);
            canvas.parent('p5canvas');
            noFill();                    // NO FILL FOR SHAPES
            strokeCap(ROUND);
            strokeJoin(ROUND);

            circleX = width / 2;
            circleY = height * 0.28;
            R = 78;
            updateContactPoint();

            speedSlider = select('#speedSlider');
            speedDisplay = select('#speedDisplay');
            speedSlider.input(() => {
                travelSpeed = float(speedSlider.value());
                speedDisplay.html(travelSpeed.toFixed(3));
            });
        }

        function updateContactPoint() {
            let dx = constrain(contactOffsetX, 0, R - 5);
            contactX = circleX + dx;
            contactY = circleY + sqrt(R * R - dx * dx);
            waveBaseY = contactY;
        }

        function waveY(x) {
            let angle0 = k * (x - contactX) + HALF_PI;
            let angle1 = 2 * k * (x - contactX) + HALF_PI;
            let angle2 = 3 * k * (x - contactX) + HALF_PI;
            let dx = x - contactX;
            let travelPhase = 0.42 * sin(dx * 0.038 - t * travelSpeed) * (abs(dx) / 70);
            let fund = sin(angle0 + travelPhase);
            let harm = sin(angle1);
            let third = sin(angle2);
            let total = fund + harmonicWeight * harm + thirdWeight * third;
            let maxPossible = 1 + harmonicWeight + thirdWeight;
            let norm = total / maxPossible;
            return waveBaseY + amplitude * (1 - norm);
        }

        function draw() {
            background(0);
            drawingContext.shadowBlur = 0;
            drawingContext.shadowColor = "transparent";

            harmonicWeight = 0.65 + 0.11 * sin(t * 0.43);
            thirdWeight = 0.45 + 0.09 * cos(t * 0.39);

            // draw wave
            stroke(70, 255, 100, 230);
            strokeWeight(2.8);
            beginShape();
            for (let x = 0; x <= width; x += 3) {
                let y = waveY(x);
                vertex(x, y);
            }
            endShape();

            // draw circle
            stroke(90, 230, 120);
            strokeWeight(2.5);
            circle(circleX, circleY, R * 2);
            stroke(60, 180, 80, 100);
            strokeWeight(1.2);
            circle(circleX, circleY, R * 2 - 8);

            // spinning arrow
            push();
            translate(circleX, circleY);
            rotate(arrowAngle);
            stroke(150, 255, 150, 240);
            strokeWeight(2.2);
            line(0, 0, R - 10, 0);
            strokeWeight(1.8);
            line(R - 10, 0, R - 18, -6);
            line(R - 10, 0, R - 18, 6);
            pop();

            // contact point highlight
            push();
            stroke(140, 255, 120, 200);
            strokeWeight(2);
            noFill();
            circle(contactX, contactY, 10);
            stroke(220, 255, 160);
            strokeWeight(1.5);
            circle(contactX, contactY, 4);
            pop();

            // text info (fixed size)
            fill(100, 210, 100);
            noStroke();
            textSize(13);
            textFont("monospace");
            text("央美小白楼3F · White Building Across From CAFAM 3F", 16, height - 20);
            text("one‑point tangency  →  continuous left‑right motion", 16, height - 6);
            text("美院毕业季卫星艺术生态  |  Satellite Art Ecosystem", circleX - 95, circleY - R - 10);

            noFill();
            arrowAngle += arrowBaseSpeed;
            t += 0.028;
            if (arrowAngle > TWO_PI) arrowAngle -= TWO_PI;
        }

        function windowResized() {
            // Do NOT resize canvas; keep 900x600.
            // Just redraw to avoid any glitches.
            redraw();
        }
    </script>
</body>

</html>
